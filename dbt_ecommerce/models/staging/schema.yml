version: 2

sources:
  - name: ecommerce_raw
    schema: raw
    tables:
      - name: users
      - name: orders
      - name: products
      - name: order_items

models:
  - name: stg_users
    description: "Staging model for users"
    columns:
      - name: user_id
        tests:
          - unique
          - not_null
      - name: email
        tests:
          - not_null
          - unique
          - is_valid_email
          
  - name: stg_orders
    description: "Staging model for orders"
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: user_id
        tests:
          - not_null
      - name: order_status
        tests:
          - not_null
          - accepted_values:
              values: ['pending', 'shipped', 'delivered', 'returned', 'cancelled']
