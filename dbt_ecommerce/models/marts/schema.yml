version: 2

models:
  - name: dim_users
    description: "Dimension table for users"
    columns:
      - name: user_id
        tests:
          - unique
          - not_null
      - name: email
        tests:
          - unique
          - not_null

  - name: dim_products
    description: "Dimension table for products"
    columns:
      - name: product_id
        tests:
          - unique
          - not_null
      - name: price
        tests:
          - not_null

  - name: fct_orders
    description: "Fact table for orders"
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: user_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_users')
              field: user_id
      - name: order_status
        tests:
          - not_null
          - accepted_values:
              values: ['pending', 'shipped', 'delivered', 'returned', 'cancelled']
      - name: total_amount
        tests:
          - not_null
